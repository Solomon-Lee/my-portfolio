<svg width="260" height="230" viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg">
  <!-- Bell curve (weight distribution) -->
  <path d="M30,160 Q50,158 70,150 Q90,130 105,100 Q115,75 130,62 Q145,75 155,100 Q170,130 190,150 Q210,158 230,160" fill="none" stroke="#5EEAD4" stroke-width="1.5" opacity="0.3"/>
  <path d="M30,160 Q50,158 70,150 Q90,130 105,100 Q115,75 130,62 Q145,75 155,100 Q170,130 190,150 Q210,158 230,160 L230,162 L30,162 Z" fill="#0D9488" opacity="0.06"/>

  <!-- Quantization levels - dots on number line (E2M1-like, clustered near center) -->
  <line x1="30" y1="160" x2="230" y2="160" stroke="#5EEAD4" stroke-width="0.5" opacity="0.2"/>

  <!-- E2M1 dots (top row - teal, clustered near zero) -->
  <circle cx="30" cy="142" r="4" fill="#0D9488" opacity="0.8"/>
  <circle cx="70" cy="142" r="4" fill="#0D9488" opacity="0.8"/>
  <circle cx="100" cy="142" r="4" fill="#0D9488"/>
  <circle cx="115" cy="142" r="4" fill="#0D9488"/>
  <circle cx="122" cy="142" r="4" fill="#0D9488"/>
  <circle cx="130" cy="142" r="4" fill="#0D9488"/>
  <circle cx="138" cy="142" r="4" fill="#0D9488"/>
  <circle cx="145" cy="142" r="4" fill="#0D9488"/>
  <circle cx="160" cy="142" r="4" fill="#0D9488"/>
  <circle cx="190" cy="142" r="4" fill="#0D9488" opacity="0.8"/>
  <circle cx="230" cy="142" r="4" fill="#0D9488" opacity="0.8"/>

  <!-- SF4 dots (bottom row - coral/amber, spread outward after pruning) -->
  <circle cx="30" cy="178" r="4" fill="#D85A30"/>
  <circle cx="55" cy="178" r="4" fill="#D85A30"/>
  <circle cx="75" cy="178" r="4" fill="#D85A30"/>
  <circle cx="95" cy="178" r="4" fill="#D85A30"/>
  <!-- gap in the middle (pruned) -->
  <circle cx="130" cy="178" r="3" fill="#D85A30" opacity="0.3"/>
  <!-- mirror -->
  <circle cx="165" cy="178" r="4" fill="#D85A30"/>
  <circle cx="185" cy="178" r="4" fill="#D85A30"/>
  <circle cx="205" cy="178" r="4" fill="#D85A30"/>
  <circle cx="230" cy="178" r="4" fill="#D85A30"/>

  <!-- Row labels -->
  <text x="18" y="146" text-anchor="end" font-family="monospace" font-size="8" fill="#0D9488" opacity="0.8">E2M1</text>
  <text x="18" y="182" text-anchor="end" font-family="monospace" font-size="8" fill="#D85A30" opacity="0.8">SF4</text>

  <!-- Pruning arrows showing shift outward -->
  <path d="M118,158 L105,170" fill="none" stroke="#D85A30" stroke-width="0.8" opacity="0.4" marker-end="url(#arrowSf4)"/>
  <path d="M142,158 L155,170" fill="none" stroke="#D85A30" stroke-width="0.8" opacity="0.4" marker-end="url(#arrowSf4)"/>
  <defs>
    <marker id="arrowSf4" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M1 1L5 3L1 5" fill="none" stroke="#D85A30" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Bit format labels -->
  <text x="130" y="32" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#5EEAD4">FP4</text>

  <!-- Bit boxes -->
  <rect x="72" y="40" width="18" height="16" rx="3" fill="#0D9488" opacity="0.25" stroke="#0D9488" stroke-width="1"/>
  <text x="81" y="52" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#5EEAD4">S</text>

  <rect x="94" y="40" width="18" height="16" rx="3" fill="#D85A30" opacity="0.2" stroke="#D85A30" stroke-width="1"/>
  <text x="103" y="52" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#D85A30">E</text>

  <rect x="116" y="40" width="18" height="16" rx="3" fill="#378ADD" opacity="0.2" stroke="#378ADD" stroke-width="1"/>
  <rect x="138" y="40" width="18" height="16" rx="3" fill="#378ADD" opacity="0.2" stroke="#378ADD" stroke-width="1"/>
  <text x="125" y="52" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#378ADD">M</text>
  <text x="147" y="52" text-anchor="middle" font-family="monospace" font-size="8" font-weight="600" fill="#378ADD">M</text>

  <rect x="160" y="40" width="28" height="16" rx="3" fill="none" stroke="#5EEAD4" stroke-width="1" stroke-dasharray="3 2" opacity="0.4"/>
  <text x="174" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#5EEAD4" opacity="0.6">E1M2</text>

  <!-- Label -->
  <text x="130" y="212" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#5EEAD4" letter-spacing="1">QUANTIZATION</text>
</svg>

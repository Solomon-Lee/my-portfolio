<svg width="260" height="200" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Image frame (target) -->
  <rect x="30" y="30" width="80" height="65" rx="6" fill="#1a2332" stroke="#5EEAD4" stroke-width="1.5"/>
  <!-- Mountain/landscape inside frame -->
  <polygon points="40,85 55,55 70,70 85,50 100,85" fill="#0D9488" opacity="0.3"/>
  <circle cx="50" cy="48" r="5" fill="#5EEAD4" opacity="0.4"/>
  <!-- Star sparkle on image -->
  <path d="M92,38 L94,44 L100,44 L95,48 L97,54 L92,50 L87,54 L89,48 L84,44 L90,44 Z" fill="#5EEAD4" opacity="0.6"/>

  <!-- Arrow from target to agent -->
  <line x1="112" y1="62" x2="138" y2="62" stroke="#5EEAD4" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="140,62 134,58 134,66" fill="#5EEAD4"/>

  <!-- Agent brain (circular with nodes) -->
  <circle cx="175" cy="55" r="30" fill="#1a2332" stroke="#0D9488" stroke-width="1.5"/>
  <!-- Neural connections inside -->
  <circle cx="163" cy="45" r="3" fill="#5EEAD4" opacity="0.7"/>
  <circle cx="185" cy="42" r="3" fill="#5EEAD4" opacity="0.7"/>
  <circle cx="170" cy="62" r="3" fill="#5EEAD4" opacity="0.7"/>
  <circle cx="187" cy="60" r="3" fill="#5EEAD4" opacity="0.7"/>
  <circle cx="175" cy="75" r="3" fill="#5EEAD4" opacity="0.5"/>
  <line x1="163" y1="45" x2="185" y2="42" stroke="#5EEAD4" stroke-width="0.6" opacity="0.4"/>
  <line x1="163" y1="45" x2="170" y2="62" stroke="#5EEAD4" stroke-width="0.6" opacity="0.4"/>
  <line x1="185" y1="42" x2="187" y2="60" stroke="#5EEAD4" stroke-width="0.6" opacity="0.4"/>
  <line x1="170" y1="62" x2="187" y2="60" stroke="#5EEAD4" stroke-width="0.6" opacity="0.4"/>
  <line x1="170" y1="62" x2="175" y2="75" stroke="#5EEAD4" stroke-width="0.6" opacity="0.3"/>
  <line x1="187" y1="60" x2="175" y2="75" stroke="#5EEAD4" stroke-width="0.6" opacity="0.3"/>

  <!-- Shopping cart on agent -->
  <path d="M195,72 L200,72 L205,82 L192,82 Z" fill="none" stroke="#0D9488" stroke-width="1.2"/>
  <circle cx="195" cy="85" r="1.5" fill="#0D9488"/>
  <circle cx="203" cy="85" r="1.5" fill="#0D9488"/>

  <!-- Circular arrow (optimization loop) -->
  <path d="M215,55 A45,45 0 0,1 175,100" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>
  <path d="M175,100 A45,45 0 0,1 135,55" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>
  <!-- Loop arrow head -->
  <polygon points="135,55 139,62 131,60" fill="#5EEAD4" opacity="0.4"/>

  <!-- Text prompt snippets floating -->
  <rect x="210" y="28" width="35" height="12" rx="3" fill="#0D9488" opacity="0.2" stroke="#0D9488" stroke-width="0.5"/>
  <rect x="214" y="32" width="18" height="3" rx="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="214" y="37" width="12" height="2" rx="1" fill="#5EEAD4" opacity="0.3"/>

  <rect x="218" y="48" width="30" height="12" rx="3" fill="#0D9488" opacity="0.2" stroke="#0D9488" stroke-width="0.5"/>
  <rect x="222" y="52" width="15" height="3" rx="1" fill="#5EEAD4" opacity="0.4"/>
  <rect x="222" y="57" width="10" height="2" rx="1" fill="#5EEAD4" opacity="0.3"/>

  <!-- Labels -->
  <text x="130" y="140" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#5EEAD4" letter-spacing="1">PROMPT</text>
  <text x="130" y="158" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#5EEAD4" letter-spacing="1">OPTIMIZER</text>
</svg>

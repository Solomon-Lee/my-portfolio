<svg width="260" height="230" viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg">
  <!-- Rising bar chart (startup growth) -->
  <rect x="45" y="145" width="24" height="30" rx="3" fill="#0D9488" opacity="0.3"/>
  <rect x="78" y="125" width="24" height="50" rx="3" fill="#0D9488" opacity="0.4"/>
  <rect x="111" y="100" width="24" height="75" rx="3" fill="#0D9488" opacity="0.55"/>
  <rect x="144" y="70" width="24" height="105" rx="3" fill="#0D9488" opacity="0.7"/>
  <rect x="177" y="42" width="24" height="133" rx="3" fill="#0D9488" opacity="0.9"/>

  <!-- Trend line -->
  <path d="M55,155 Q100,130 130,110 Q160,85 190,50" fill="none" stroke="#5EEAD4" stroke-width="2" stroke-linecap="round"/>

  <!-- Neural network nodes overlaid on chart -->
  <!-- Input layer -->
  <circle cx="57" cy="155" r="6" fill="#1a2332" stroke="#5EEAD4" stroke-width="1.5"/>
  <circle cx="57" cy="130" r="6" fill="#1a2332" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- Hidden layer -->
  <circle cx="130" cy="110" r="7" fill="#1a2332" stroke="#0D9488" stroke-width="2"/>
  <circle cx="130" cy="80" r="7" fill="#1a2332" stroke="#0D9488" stroke-width="2"/>
  <circle cx="130" cy="140" r="7" fill="#1a2332" stroke="#0D9488" stroke-width="2"/>

  <!-- Output node -->
  <circle cx="190" cy="50" r="8" fill="#0D9488" stroke="#5EEAD4" stroke-width="2"/>

  <!-- Connections (input → hidden) -->
  <line x1="63" y1="155" x2="123" y2="110" stroke="#5EEAD4" stroke-width="0.7" opacity="0.35"/>
  <line x1="63" y1="155" x2="123" y2="140" stroke="#5EEAD4" stroke-width="0.7" opacity="0.25"/>
  <line x1="63" y1="130" x2="123" y2="80" stroke="#5EEAD4" stroke-width="0.7" opacity="0.4"/>
  <line x1="63" y1="130" x2="123" y2="110" stroke="#5EEAD4" stroke-width="0.7" opacity="0.3"/>

  <!-- Connections (hidden → output) -->
  <line x1="137" y1="80" x2="183" y2="50" stroke="#5EEAD4" stroke-width="0.8" opacity="0.5"/>
  <line x1="137" y1="110" x2="183" y2="50" stroke="#5EEAD4" stroke-width="0.8" opacity="0.4"/>
  <line x1="137" y1="140" x2="183" y2="50" stroke="#5EEAD4" stroke-width="0.8" opacity="0.25"/>

  <!-- Checkmark in output node (fund decision) -->
  <path d="M185,51 L189,55 L196,45" fill="none" stroke="#5EEAD4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dollar signs as input hints -->
  <text x="57" y="158" text-anchor="middle" dominant-baseline="central" font-size="7" font-weight="700" fill="#5EEAD4">$</text>
  <text x="57" y="133" text-anchor="middle" dominant-baseline="central" font-size="7" font-weight="700" fill="#5EEAD4">P</text>

  <!-- Pitch deck icon (small page) -->
  <rect x="210" y="90" width="22" height="28" rx="2" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.5"/>
  <line x1="214" y1="98" x2="228" y2="98" stroke="#5EEAD4" stroke-width="0.8" opacity="0.4"/>
  <line x1="214" y1="103" x2="226" y2="103" stroke="#5EEAD4" stroke-width="0.8" opacity="0.4"/>
  <line x1="214" y1="108" x2="224" y2="108" stroke="#5EEAD4" stroke-width="0.8" opacity="0.4"/>
  <!-- Fold corner -->
  <path d="M226,90 L232,96 L226,96 Z" fill="#5EEAD4" opacity="0.3"/>

  <!-- Label -->
  <text x="130" y="200" text-anchor="middle" font-family="monospace" font-size="14" font-weight="600" fill="#5EEAD4" letter-spacing="1.5">AI VC</text>
  <text x="130" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="#5EEAD4" opacity="0.6" letter-spacing="1">RESEARCH</text>
</svg>

<svg width="260" height="230" viewBox="0 0 260 230" xmlns="http://www.w3.org/2000/svg">
  <!-- Chip body -->
  <rect x="65" y="50" width="130" height="120" rx="12" fill="#1a2332" stroke="#0D9488" stroke-width="2"/>

  <!-- Chip pins - top -->
  <rect x="95" y="36" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="115" y="36" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="135" y="36" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="155" y="36" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>

  <!-- Chip pins - bottom -->
  <rect x="95" y="164" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="115" y="164" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="135" y="164" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="155" y="164" width="8" height="20" rx="2" fill="#0D9488" opacity="0.7"/>

  <!-- Chip pins - left -->
  <rect x="51" y="75" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="51" y="95" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="51" y="115" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="51" y="135" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>

  <!-- Chip pins - right -->
  <rect x="189" y="75" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="189" y="95" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="189" y="115" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>
  <rect x="189" y="135" width="20" height="8" rx="2" fill="#0D9488" opacity="0.7"/>

  <!-- Chat bubble inside chip -->
  <rect x="90" y="72" width="80" height="50" rx="10" fill="#0D9488" opacity="0.15" stroke="#0D9488" stroke-width="1.5"/>
  <polygon points="105,122 115,122 100,134" fill="#0D9488" opacity="0.15" stroke="#0D9488" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Code lines inside bubble -->
  <rect x="102" y="84" width="36" height="4" rx="2" fill="#5EEAD4"/>
  <rect x="102" y="93" width="52" height="4" rx="2" fill="#5EEAD4" opacity="0.6"/>
  <rect x="102" y="102" width="24" height="4" rx="2" fill="#5EEAD4" opacity="0.4"/>

  <!-- Circuit traces -->
  <line x1="85" y1="150" x2="130" y2="150" stroke="#0D9488" stroke-width="1" opacity="0.4"/>
  <circle cx="130" cy="150" r="2.5" fill="#0D9488" opacity="0.6"/>
  <line x1="130" y1="150" x2="175" y2="150" stroke="#0D9488" stroke-width="1" opacity="0.4"/>
  <circle cx="175" cy="150" r="2.5" fill="#0D9488" opacity="0.6"/>

  <!-- Label -->
  <text x="130" y="210" text-anchor="middle" font-family="monospace" font-size="14" font-weight="600" fill="#5EEAD4" letter-spacing="2">VERILOG AI</text>
</svg>

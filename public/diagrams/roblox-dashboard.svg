<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Kubernetes clusters -->
  <rect x="230" y="20" width="220" height="60" rx="6" fill="FILL_BLUE" stroke="STROKE_BLUE" stroke-width="0.5"/>
  <text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Kubernetes clusters</text>
  <text x="340" y="62" text-anchor="middle" font-size="11" fill="MUTED">Resource allocation data</text>

  <!-- K8s → Go -->
  <line x1="340" y1="80" x2="340" y2="118" stroke="TEXT" stroke-width="1" marker-end="url(#arr2)"/>

  <!-- Cost calculator (Go) -->
  <rect x="250" y="120" width="180" height="70" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="340" y="148" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Cost calculator</text>
  <text x="340" y="168" text-anchor="middle" font-size="11" fill="MUTED">(Go) Cumulative counters</text>

  <!-- S3 -->
  <rect x="60" y="240" width="130" height="50" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="125" y="265" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">S3</text>
  <text x="160" y="224" font-size="10" fill="MUTED">Parquet backup</text>

  <!-- Go → S3 -->
  <line x1="280" y1="190" x2="192" y2="240" stroke="TEXT" stroke-width="1" marker-end="url(#arr2)"/>

  <!-- Prometheus -->
  <rect x="275" y="240" width="130" height="50" rx="6" fill="FILL_CORAL" stroke="STROKE_CORAL" stroke-width="0.5"/>
  <text x="340" y="265" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Prometheus</text>

  <!-- Go → Prometheus -->
  <line x1="340" y1="190" x2="340" y2="238" stroke="TEXT" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="370" y="222" font-size="10" fill="MUTED">Metrics endpoint</text>

  <!-- Grafana -->
  <rect x="490" y="240" width="130" height="50" rx="6" fill="FILL_PURPLE" stroke="STROKE_PURPLE" stroke-width="0.5"/>
  <text x="555" y="265" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Grafana</text>

  <!-- Prometheus → Grafana -->
  <line x1="405" y1="265" x2="488" y2="265" stroke="TEXT" stroke-width="1" marker-end="url(#arr2)"/>
  <text x="447" y="257" text-anchor="middle" font-size="10" fill="MUTED">Visualize</text>

  <!-- Grafana features -->
  <text x="555" y="310" text-anchor="middle" font-size="11" fill="MUTED">Budget tracking</text>
  <text x="555" y="326" text-anchor="middle" font-size="11" fill="MUTED">Utilization views</text>
  <text x="555" y="342" text-anchor="middle" font-size="11" fill="MUTED">Cost per team</text>
</svg>

<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Kialo Debate Trees -->
  <rect x="40" y="30" width="120" height="65" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="100" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Kialo debates</text>
  <text x="100" y="72" text-anchor="middle" font-size="11" fill="MUTED">28 debate trees</text>
  <text x="100" y="86" text-anchor="middle" font-size="10" fill="MUTED">Pro/con hierarchy</text>

  <!-- Persona Generator -->
  <rect x="220" y="20" width="170" height="85" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="305" y="42" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Persona generator</text>
  <text x="305" y="62" text-anchor="middle" font-size="11" fill="MUTED">Domain isolation</text>
  <text x="305" y="78" text-anchor="middle" font-size="11" fill="MUTED">Opinionated meta-prompt</text>
  <text x="305" y="94" text-anchor="middle" font-size="10" fill="MUTED">Pro ↔ Con personas</text>

  <!-- Trees → Generator -->
  <line x1="160" y1="62" x2="218" y2="62" stroke="TEXT" stroke-width="1" marker-end="url(#a8)"/>

  <!-- Domain Mapping -->
  <rect x="230" y="125" width="150" height="40" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="305" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="TEXT">Domain mapping</text>
  <text x="305" y="162" text-anchor="middle" font-size="10" fill="MUTED">Researcher-curated JSON</text>

  <!-- Domain → Generator -->
  <line x1="305" y1="125" x2="305" y2="107" stroke="MUTED" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- LLM Evaluation -->
  <rect x="460" y="25" width="160" height="75" rx="6" fill="FILL_BLUE" stroke="STROKE_BLUE" stroke-width="0.5"/>
  <text x="540" y="47" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">LLM evaluation</text>
  <text x="540" y="67" text-anchor="middle" font-size="11" fill="MUTED">OpenAI Batch API</text>
  <text x="540" y="83" text-anchor="middle" font-size="11" fill="MUTED">Pro · Con · Baseline</text>

  <!-- Generator → LLM -->
  <line x1="390" y1="62" x2="458" y2="62" stroke="TEXT" stroke-width="1" marker-end="url(#a8)"/>
  <text x="424" y="54" text-anchor="middle" font-size="10" fill="MUTED">Personas</text>

  <!-- Override conditions -->
  <rect x="40" y="190" width="150" height="80" rx="6" fill="FILL_CORAL" stroke="STROKE_CORAL" stroke-width="0.5"/>
  <text x="115" y="212" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Override design</text>
  <text x="115" y="232" text-anchor="middle" font-size="11" fill="MUTED">Fan → Framework</text>
  <text x="115" y="248" text-anchor="middle" font-size="11" fill="MUTED">Expert · Contradict</text>
  <text x="115" y="264" text-anchor="middle" font-size="10" fill="MUTED">Reasoning · Override</text>

  <!-- LLM → Override (routed below domain mapping) -->
  <path d="M540 100 L540 175 L115 175 L115 188" fill="none" stroke="STROKE_CORAL" stroke-width="1" marker-end="url(#a8)"/>

  <!-- Analysis -->
  <rect x="250" y="200" width="170" height="70" rx="6" fill="FILL_PURPLE" stroke="STROKE_PURPLE" stroke-width="0.5"/>
  <text x="335" y="222" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Analysis</text>
  <text x="335" y="242" text-anchor="middle" font-size="11" fill="MUTED">Hop-distance attenuation</text>
  <text x="335" y="258" text-anchor="middle" font-size="11" fill="MUTED">Semantic vs. tree distance</text>

  <!-- Override → Analysis -->
  <line x1="190" y1="235" x2="248" y2="235" stroke="TEXT" stroke-width="1" marker-end="url(#a8)"/>

  <!-- Results -->
  <rect x="480" y="200" width="150" height="70" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="555" y="220" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Metrics</text>
  <text x="555" y="240" text-anchor="middle" font-size="11" fill="MUTED">Discrimination gap</text>
  <text x="555" y="256" text-anchor="middle" font-size="11" fill="MUTED">Coherence · Flip rate</text>

  <!-- Analysis → Results -->
  <line x1="420" y1="235" x2="478" y2="235" stroke="TEXT" stroke-width="1" marker-end="url(#a8)"/>

  <!-- Spillover experiment (below) -->
  <rect x="250" y="295" width="170" height="40" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="335" y="315" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="TEXT">Cross-topic spillover</text>
  <text x="335" y="330" text-anchor="middle" font-size="10" fill="MUTED">6×6 debate matrix</text>

  <!-- Spillover → Analysis -->
  <line x1="335" y1="295" x2="335" y2="272" stroke="MUTED" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>

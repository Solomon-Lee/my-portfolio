<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Eval Dataset -->
  <rect x="40" y="40" width="130" height="60" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="105" y="63" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Eval dataset</text>
  <text x="105" y="83" text-anchor="middle" font-size="11" fill="MUTED">Prompt + test bench</text>

  <!-- Parse -->
  <line x1="170" y1="70" x2="228" y2="70" stroke="TEXT" stroke-width="1" marker-end="url(#a5)"/>
  <text x="199" y="62" text-anchor="middle" font-size="10" fill="MUTED">Parse</text>

  <!-- Models box (contains two models) -->
  <rect x="230" y="20" width="180" height="100" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="320" y="42" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Code generation</text>

  <!-- CodeGen model -->
  <rect x="242" y="58" width="72" height="50" rx="4" fill="FILL_BLUE" stroke="STROKE_BLUE" stroke-width="0.5"/>
  <text x="278" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="TEXT">CodeGen</text>
  <text x="278" y="92" text-anchor="middle" font-size="9" fill="MUTED">2B Verilog</text>

  <!-- GPT model -->
  <rect x="326" y="58" width="72" height="50" rx="4" fill="FILL_PURPLE" stroke="STROKE_PURPLE" stroke-width="0.5"/>
  <text x="362" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="TEXT">GPT-3.5</text>
  <text x="362" y="92" text-anchor="middle" font-size="9" fill="MUTED">Baseline</text>

  <!-- Generated Verilog -->
  <rect x="470" y="40" width="140" height="60" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="540" y="63" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Generated .v</text>
  <text x="540" y="83" text-anchor="middle" font-size="11" fill="MUTED">module...endmodule</text>

  <!-- Models → Generated -->
  <line x1="410" y1="70" x2="468" y2="70" stroke="TEXT" stroke-width="1" marker-end="url(#a5)"/>
  <text x="439" y="62" text-anchor="middle" font-size="10" fill="MUTED">Generate</text>

  <!-- iverilog compiler -->
  <rect x="240" y="170" width="150" height="60" rx="6" fill="FILL_CORAL" stroke="STROKE_CORAL" stroke-width="0.5"/>
  <text x="315" y="193" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">iverilog</text>
  <text x="315" y="213" text-anchor="middle" font-size="11" fill="MUTED">Compile check</text>

  <!-- Generated → iverilog (L-shaped: down then left) -->
  <path d="M540 100 L540 195 L392 195" fill="none" stroke="STROKE_CORAL" stroke-width="1" marker-end="url(#a5)"/>
  <text x="550" y="150" font-size="10" fill="MUTED">+ test bench</text>

  <!-- vvp simulator -->
  <rect x="240" y="260" width="150" height="50" rx="6" fill="FILL_BLUE" stroke="STROKE_BLUE" stroke-width="0.5"/>
  <text x="315" y="278" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">vvp</text>
  <text x="315" y="298" text-anchor="middle" font-size="11" fill="MUTED">Simulate + verify</text>

  <!-- iverilog → vvp -->
  <line x1="315" y1="230" x2="315" y2="258" stroke="TEXT" stroke-width="1" marker-end="url(#a5)"/>

  <!-- Results -->
  <rect x="470" y="250" width="170" height="70" rx="6" fill="FILL_PURPLE" stroke="STROKE_PURPLE" stroke-width="0.5"/>
  <text x="555" y="273" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Accuracy report</text>
  <text x="555" y="293" text-anchor="middle" font-size="11" fill="MUTED">Compilation %</text>
  <text x="555" y="309" text-anchor="middle" font-size="11" fill="MUTED">Functional %</text>

  <!-- vvp → Results -->
  <line x1="390" y1="285" x2="468" y2="285" stroke="STROKE_PURPLE" stroke-width="1" marker-end="url(#a5)"/>
  <text x="429" y="277" text-anchor="middle" font-size="10" fill="MUTED">Parse output</text>

  <!-- Compilation label on iverilog -->
  <text x="175" y="195" text-anchor="middle" font-size="10" fill="MUTED">Pass / fail</text>
  <line x1="238" y1="195" x2="200" y2="195" stroke="MUTED" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>

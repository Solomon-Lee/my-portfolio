<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Developer -->
  <rect x="40" y="30" width="100" height="44" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="90" y="52" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Developer</text>

  <!-- PySpark Notebook -->
  <rect x="200" y="20" width="160" height="64" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="280" y="42" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">PySpark notebook</text>
  <text x="280" y="62" text-anchor="middle" font-size="11" fill="MUTED">Preconfigured queries</text>

  <!-- Developer → Notebook -->
  <line x1="140" y1="52" x2="198" y2="52" stroke="TEXT" stroke-width="1" marker-end="url(#a4)"/>
  <text x="169" y="44" text-anchor="middle" font-size="10" fill="MUTED">Run</text>

  <!-- Hive -->
  <rect x="420" y="20" width="120" height="64" rx="6" fill="FILL_GRAY" stroke="STROKE_GRAY" stroke-width="0.5"/>
  <text x="480" y="42" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Hive tables</text>
  <text x="480" y="62" text-anchor="middle" font-size="11" fill="MUTED">DAU / MAU data</text>

  <!-- Notebook → Hive -->
  <line x1="360" y1="42" x2="418" y2="42" stroke="TEXT" stroke-width="1" marker-end="url(#a4)"/>
  <text x="389" y="34" text-anchor="middle" font-size="10" fill="MUTED">Query</text>

  <!-- Hive → Notebook -->
  <line x1="418" y1="62" x2="360" y2="62" stroke="TEXT" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a4)"/>
  <text x="389" y="78" text-anchor="middle" font-size="10" fill="MUTED">User IDs</text>

  <!-- SQS -->
  <rect x="560" y="115" width="100" height="50" rx="6" fill="FILL_BLUE" stroke="STROKE_BLUE" stroke-width="0.5"/>
  <text x="610" y="140" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">SQS queue</text>

  <!-- Notebook → SQS -->
  <line x1="340" y1="84" x2="610" y2="113" stroke="STROKE_BLUE" stroke-width="1" marker-end="url(#a4)"/>
  <text x="500" y="93" text-anchor="middle" font-size="10" fill="MUTED">Auto-load</text>

  <!-- Processor -->
  <rect x="220" y="155" width="240" height="80" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="340" y="178" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Remediation processor</text>
  <text x="340" y="198" text-anchor="middle" font-size="11" fill="MUTED">(C# / .NET) Pluggable operations</text>
  <text x="340" y="218" text-anchor="middle" font-size="11" fill="MUTED">Rate-limited · Kill switch</text>

  <!-- SQS → Processor -->
  <line x1="610" y1="165" x2="610" y2="195" stroke="STROKE_BLUE" stroke-width="1"/>
  <line x1="610" y1="195" x2="462" y2="195" stroke="STROKE_BLUE" stroke-width="1" marker-end="url(#a4)"/>
  <text x="545" y="187" text-anchor="middle" font-size="10" fill="MUTED">Consume</text>

  <!-- Avatar Backend Services -->
  <rect x="520" y="245" width="130" height="70" rx="6" fill="FILL_CORAL" stroke="STROKE_CORAL" stroke-width="0.5"/>
  <text x="585" y="268" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Avatar APIs</text>
  <text x="585" y="288" text-anchor="middle" font-size="11" fill="MUTED">Ownership</text>
  <text x="585" y="304" text-anchor="middle" font-size="11" fill="MUTED">Bundles · Assets</text>

  <!-- Processor → Backend -->
  <line x1="420" y1="235" x2="518" y2="270" stroke="STROKE_CORAL" stroke-width="1" marker-end="url(#a4)"/>
  <text x="460" y="246" text-anchor="middle" font-size="10" fill="MUTED">Remediate</text>

  <!-- Grafana -->
  <rect x="40" y="175" width="130" height="50" rx="6" fill="FILL_PURPLE" stroke="STROKE_PURPLE" stroke-width="0.5"/>
  <text x="105" y="200" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Grafana</text>

  <!-- Processor → Grafana -->
  <line x1="218" y1="200" x2="172" y2="200" stroke="STROKE_PURPLE" stroke-width="1" marker-end="url(#a4)"/>
  <text x="195" y="192" text-anchor="middle" font-size="10" fill="MUTED">Metrics</text>

  <!-- Grafana details -->
  <text x="105" y="245" text-anchor="middle" font-size="11" fill="MUTED">Throughput</text>
  <text x="105" y="261" text-anchor="middle" font-size="11" fill="MUTED">Success / failure</text>
  <text x="105" y="277" text-anchor="middle" font-size="11" fill="MUTED">Queue depth</text>

  <!-- Scale note -->
  <rect x="270" y="275" width="140" height="36" rx="6" fill="none" stroke="MUTED" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="340" y="297" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="MUTED">× N instances</text>

  <!-- Scale arrow -->
  <line x1="340" y1="235" x2="340" y2="273" stroke="MUTED" stroke-width="0.5" stroke-dasharray="3 3"/>
</svg>

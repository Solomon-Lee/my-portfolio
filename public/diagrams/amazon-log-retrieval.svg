  <line x1="380" y1="165" x2="535" y2="92" stroke="STROKE_BLUE" stroke-width="1" marker-end="url(#a2)"/>
  <text x="470" y="138" text-anchor="middle" font-size="10" fill="MUTED">Upload</text>


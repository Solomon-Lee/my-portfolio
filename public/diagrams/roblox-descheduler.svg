<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- K8s cluster boundary -->
  <rect x="30" y="20" width="620" height="200" rx="12" fill="none" stroke="MUTED" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="50" y="44" font-size="12" font-weight="600" fill="MUTED">Kubernetes cluster</text>

  <!-- Prometheus -->
  <rect x="60" y="80" width="120" height="50" rx="6" fill="FILL_CORAL" stroke="STROKE_CORAL" stroke-width="0.5"/>
  <text x="120" y="105" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Prometheus</text>

  <!-- Descheduler -->
  <rect x="270" y="70" width="140" height="70" rx="6" fill="FILL_ACCENT" stroke="STROKE_ACCENT" stroke-width="0.5"/>
  <text x="340" y="98" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Descheduler</text>
  <text x="340" y="118" text-anchor="middle" font-size="11" fill="MUTED">(Go)</text>

  <!-- Idle workloads -->
  <rect x="500" y="65" width="130" height="80" rx="6" fill="FILL_BLUE" stroke="STROKE_BLUE" stroke-width="0.5"/>
  <text x="565" y="92" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Idle workloads</text>
  <text x="565" y="112" text-anchor="middle" font-size="11" fill="MUTED">Kubeflow / Ray</text>
  <text x="565" y="130" text-anchor="middle" font-size="11" fill="MUTED">Pending pods</text>

  <!-- Prometheus ↔ Descheduler arrows -->
  <line x1="180" y1="98" x2="268" y2="98" stroke="TEXT" stroke-width="1" marker-end="url(#arr1)"/>
  <line x1="268" y1="112" x2="180" y2="112" stroke="TEXT" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr1)"/>
  <text x="224" y="90" text-anchor="middle" font-size="10" fill="MUTED">Query metrics</text>
  <text x="224" y="126" text-anchor="middle" font-size="10" fill="MUTED">GPU/CPU util</text>

  <!-- Descheduler → Idle workloads -->
  <line x1="410" y1="105" x2="498" y2="105" stroke="STROKE_CORAL" stroke-width="1" marker-end="url(#arr1)"/>
  <text x="454" y="97" text-anchor="middle" font-size="10" fill="MUTED">Terminate</text>

  <!-- Grafana -->
  <rect x="270" y="260" width="140" height="50" rx="6" fill="FILL_PURPLE" stroke="STROKE_PURPLE" stroke-width="0.5"/>
  <text x="340" y="285" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="TEXT">Grafana</text>

  <!-- Descheduler → Grafana -->
  <line x1="340" y1="140" x2="340" y2="258" stroke="TEXT" stroke-width="1" marker-end="url(#arr1)"/>
  <text x="355" y="200" font-size="10" fill="MUTED">Export metrics</text>
  <text x="355" y="214" font-size="10" fill="MUTED">(GPUs freed,</text>
  <text x="355" y="228" font-size="10" fill="MUTED">$ saved)</text>
</svg>
